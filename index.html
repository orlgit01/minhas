<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado Pro - Com Data de Compra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .checked { text-decoration: line-through; opacity: 0.5; filter: grayscale(1); }
        .budget-over { color: #ef4444 !important; animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .edit-mode { border: 2px solid #3b82f6 !important; background-color: #eff6ff !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-44">

    <header class="bg-emerald-600 text-white p-6 shadow-md sticky top-0 z-20">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black tracking-tight italic">MERCADO PRO</h1>
                <p id="current-date" class="text-emerald-100 text-[10px] uppercase font-bold tracking-widest"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleDataPanel()" class="p-2 bg-emerald-700/50 rounded-lg hover:bg-white/20 transition-all"><i data-lucide="settings-2" class="w-5 h-5"></i></button>
                <button onclick="clearList()" class="p-2 bg-emerald-700/50 rounded-lg hover:bg-red-500 transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            </div>
        </div>
    </header>

    <div id="data-panel" class="fixed inset-x-0 top-20 z-30 max-w-md mx-auto p-4 hidden">
        <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 p-6">
            <h2 class="text-slate-800 font-bold mb-4 flex items-center gap-2"><i data-lucide="database" class="w-5 h-5"></i> Backup</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="exportData()" class="flex flex-col items-center p-4 bg-blue-50 text-blue-600 rounded-xl font-bold uppercase text-xs"><i data-lucide="download" class="mb-2"></i>Exportar</button>
                <label class="flex flex-col items-center p-4 bg-amber-50 text-amber-600 rounded-xl font-bold uppercase text-xs cursor-pointer"><i data-lucide="upload" class="mb-2"></i>Importar<input type="file" class="hidden" onchange="importData(event)"></label>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-100 p-2 rounded-full text-emerald-600"><i data-lucide="wallet" class="w-5 h-5"></i></div>
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Limite (R$)</p>
                    <input type="text" id="budget-limit" value="0,00" onblur="formatInputMoney(this); saveBudget()" class="font-bold text-slate-700 outline-none w-24 bg-transparent">
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 font-bold uppercase italic">Disponível</p>
                <span id="budget-remaining" class="font-bold text-emerald-600 text-sm">R$ 0,00</span>
            </div>
        </div>

        <div id="main-form" class="bg-white rounded-2xl shadow-lg p-5 mb-6 border border-slate-100 space-y-4 transition-all">
            <input type="text" id="prod-name" placeholder="Nome do item..." class="w-full bg-slate-50 border-none p-4 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none text-lg font-medium text-slate-700">
            
            <div class="grid grid-cols-2 gap-3">
                <div class="flex items-center bg-slate-50 rounded-xl p-1 border border-slate-100">
                    <button onclick="changeQty(-0.1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm text-emerald-600 font-bold">-</button>
                    <input type="text" id="prod-qty" value="1,000" class="w-full text-center bg-transparent font-bold text-slate-700 outline-none" onblur="formatInputQty(this)">
                    <button onclick="changeQty(0.1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-lg shadow-sm text-emerald-600 font-bold">+</button>
                </div>
                <select id="prod-unit" class="bg-slate-50 border-none p-3 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none font-semibold text-slate-600">
                    <option value="un">Un</option><option value="kg">Kg</option><option value="g">Gr</option><option value="L">Lt</option>
                </select>
            </div>

            <div class="relative">
                <span class="absolute left-4 top-4 text-slate-400 font-bold italic text-sm">R$</span>
                <input type="text" id="prod-price" placeholder="Preço" onblur="formatInputMoney(this)" class="w-full bg-slate-50 border-none p-4 pl-12 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-slate-700">
            </div>

            <button id="btn-submit" onclick="handleFormSubmit()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg active:scale-95 transition-all">
                <i data-lucide="plus"></i> ADICIONAR
            </button>
            <button id="btn-cancel" onclick="resetForm()" class="hidden w-full text-slate-400 font-bold py-2 text-[10px] uppercase">Cancelar Edição</button>
        </div>

        <div class="relative mb-4">
            <i data-lucide="search" class="absolute left-4 top-3.5 w-4 h-4 text-slate-400"></i>
            <input type="text" id="filter-input" placeholder="Buscar na lista..." onkeyup="handleFilterInput()" 
                class="w-full bg-white border border-slate-200 p-3 pl-11 pr-11 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 text-sm font-medium text-slate-600 shadow-sm">
            <button id="clear-filter-btn" onclick="clearFilter()" class="hidden absolute right-3 top-2.5 p-1 text-slate-300">
                <i data-lucide="circle-x" class="w-5 h-5"></i>
            </button>
        </div>

        <div id="items-container" class="space-y-3 pb-4"></div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200 p-6 z-20">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Carrinho: <span id="progress-count" class="text-emerald-600">0/0</span></span>
                <span id="budget-status-text" class="text-[10px] font-bold uppercase text-slate-400">Status OK</span>
            </div>
            <div class="w-full h-1.5 bg-slate-100 rounded-full mb-4 overflow-hidden">
                <div id="progress-bar-bought" class="h-full bg-emerald-500 transition-all duration-500" style="width: 0%"></div>
            </div>
            <div class="flex justify-between items-center">
                <div class="leading-tight text-left">
                    <p class="text-slate-400 text-[9px] font-bold uppercase">Total Lista</p>
                    <p id="list-total" class="text-slate-500 font-bold text-xs">R$ 0,00</p>
                </div>
                <div class="text-right">
                    <p class="text-slate-400 text-[10px] font-bold uppercase italic tracking-tighter">Gasto no Carrinho</p>
                    <span class="text-2xl font-black text-slate-800 tracking-tighter" id="total-value">R$ 0,00</span>
                </div>
            </div>
        </div>
    </footer>

    <script>
        let shoppingList = JSON.parse(localStorage.getItem('proList_v7')) || [];
        let budget = parseFloat(localStorage.getItem('proBudget_v7')) || 0;
        let editingId = null;

        const toFloat = v => typeof v === 'number' ? v : parseFloat(v?.toString().replace(/\./g, '').replace(',', '.')) || 0;
        const toBRL = v => v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const toQtyBR = v => v.toLocaleString('pt-BR', { minimumFractionDigits: 3, maximumFractionDigits: 3 });

        function init() {
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'short' });
            document.getElementById('budget-limit').value = toBRL(budget);
            renderList();
        }

        function handleFilterInput() {
            const input = document.getElementById('filter-input');
            document.getElementById('clear-filter-btn').classList.toggle('hidden', input.value.length === 0);
            renderList();
        }

        function clearFilter() {
            document.getElementById('filter-input').value = '';
            document.getElementById('clear-filter-btn').classList.add('hidden');
            renderList();
        }

        function toggleDataPanel() { document.getElementById('data-panel').classList.toggle('hidden'); }

        function changeQty(val) {
            const input = document.getElementById('prod-qty');
            let newVal = toFloat(input.value) + val;
            input.value = toQtyBR(newVal < 0 ? 0 : newVal);
        }

        function saveBudget() {
            budget = toFloat(document.getElementById('budget-limit').value);
            saveAndRender();
        }

        function handleFormSubmit() {
            const name = document.getElementById('prod-name').value;
            const qty = toFloat(document.getElementById('prod-qty').value);
            const price = toFloat(document.getElementById('prod-price').value);
            const unit = document.getElementById('prod-unit').value;
            if (!name || price <= 0) return alert("Dados incompletos");
            if (editingId) {
                shoppingList = shoppingList.map(item => item.id === editingId ? {...item, name, qty, price, unit} : item);
            } else {
                shoppingList.push({ id: Date.now(), name, qty, price, unit, checked: false, boughtAt: null });
            }
            resetForm();
            sortAndSave();
        }

        function sortAndSave() {
            shoppingList.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR', { sensitivity: 'base' }));
            saveAndRender();
        }

        function editItem(id) {
            const item = shoppingList.find(i => i.id === id);
            if (!item) return;
            editingId = id;
            document.getElementById('prod-name').value = item.name;
            document.getElementById('prod-qty').value = toQtyBR(item.qty);
            document.getElementById('prod-price').value = toBRL(item.price);
            document.getElementById('prod-unit').value = item.unit;
            document.getElementById('main-form').classList.add('edit-mode');
            document.getElementById('btn-cancel').classList.remove('hidden');
            document.getElementById('btn-submit').innerHTML = '<i data-lucide="save"></i> SALVAR';
            document.getElementById('btn-submit').classList.replace('bg-emerald-600', 'bg-blue-600');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        }

        function resetForm() {
            editingId = null;
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-qty').value = '1,000';
            document.getElementById('prod-price').value = '';
            document.getElementById('main-form').classList.remove('edit-mode');
            document.getElementById('btn-cancel').classList.add('hidden');
            document.getElementById('btn-submit').innerHTML = '<i data-lucide="plus"></i> ADICIONAR';
            document.getElementById('btn-submit').classList.replace('bg-blue-600', 'bg-emerald-600');
            lucide.createIcons();
        }

        function toggleItem(id) {
            shoppingList = shoppingList.map(item => {
                if (item.id === id) {
                    const isNowChecked = !item.checked;
                    return { 
                        ...item, 
                        checked: isNowChecked, 
                        // Regista a data atual se estiver a marcar, remove se estiver a desmarcar
                        boughtAt: isNowChecked ? new Date().toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : null 
                    };
                }
                return item;
            });
            saveAndRender();
        }

        function deleteItem(id) {
            if (confirm("Remover?")) { shoppingList = shoppingList.filter(i => i.id !== id); saveAndRender(); }
        }

        function clearList() {
            if (confirm("Apagar tudo?")) { shoppingList = []; saveAndRender(); }
        }

        function saveAndRender() {
            localStorage.setItem('proList_v7', JSON.stringify(shoppingList));
            localStorage.setItem('proBudget_v7', budget);
            renderList();
        }

        function renderList() {
            const container = document.getElementById('items-container');
            const filterTerm = document.getElementById('filter-input').value.toLowerCase();
            container.innerHTML = '';
            let totalLista = 0, totalCarrinho = 0, checkedCount = 0;

            shoppingList.forEach(item => {
                const subtotal = item.qty * item.price;
                totalLista += subtotal;
                if(item.checked) { totalCarrinho += subtotal; checkedCount++; }

                if (item.name.toLowerCase().includes(filterTerm)) {
                    const card = document.createElement('div');
                    card.className = `bg-white p-4 rounded-2xl shadow-sm border-2 transition-all ${item.checked ? 'border-emerald-500 bg-emerald-50/20' : 'border-transparent'}`;
                    card.innerHTML = `
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center gap-3 flex-1 overflow-hidden" onclick="toggleItem(${item.id})">
                                <div class="w-6 h-6 rounded-lg border-2 flex items-center justify-center ${item.checked ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-200'}">
                                    ${item.checked ? '<i data-lucide="check" class="w-4 h-4"></i>' : ''}
                                </div>
                                <div class="flex flex-col truncate">
                                    <span class="font-bold text-slate-700 ${item.checked ? 'checked' : ''}">${item.name}</span>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${toQtyBR(item.qty)} ${item.unit} x R$ ${toBRL(item.price)}</span>
                                        ${item.boughtAt ? `<span class="text-[9px] bg-emerald-100 text-emerald-700 px-1.5 rounded font-bold uppercase italic">🛒 ${item.boughtAt}</span>` : ''}
                                    </div>
                                </div>
                            </div>
                            <span class="font-black text-slate-700 ml-2">R$ ${toBRL(subtotal)}</span>
                        </div>
                        <div class="flex justify-end gap-4 border-t border-slate-50 pt-2">
                            <button onclick="editItem(${item.id})" class="text-blue-400 text-[10px] font-bold uppercase">Editar</button>
                            <button onclick="deleteItem(${item.id})" class="text-slate-300 text-[10px] font-bold uppercase">Excluir</button>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });

            document.getElementById('budget-remaining').innerText = `R$ ${toBRL(budget - totalCarrinho)}`;
            document.getElementById('total-value').innerText = `R$ ${toBRL(totalCarrinho)}`;
            document.getElementById('list-total').innerText = `R$ ${toBRL(totalLista)}`;
            
            if (budget > 0 && totalCarrinho > budget) {
                document.getElementById('total-value').classList.add('budget-over');
            } else {
                document.getElementById('total-value').classList.remove('budget-over');
            }

            document.getElementById('progress-count').innerText = `${checkedCount}/${shoppingList.length}`;
            document.getElementById('progress-bar-bought').style.width = `${shoppingList.length > 0 ? (checkedCount / shoppingList.length) * 100 : 0}%`;
            lucide.createIcons();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({list: shoppingList, budget})], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = JSON.parse(event.target.result);
                shoppingList = data.list || []; budget = data.budget || 0;
                document.getElementById('budget-limit').value = toBRL(budget);
                sortAndSave();
            };
            reader.readAsText(e.target.files[0]);
        }

        init();
    </script>
</body>
</html>
